# Identificación del proyecto (generados por SonarQube Cloud — no cambiar)
sonar.projectKey=anycodef_gestion-inventario-mantenimiento
sonar.organization=anycodef
sonar.projectName=gestion-inventario-mantenimiento

# Código fuente — rutas confirmadas con la estructura real del repo
# backend: Clean Architecture en backend/src (use-cases, domain, infrastructure, interfaces)
# frontend: Next.js App Router en frontend/src (app, components, hooks, lib, types)
sonar.sources=frontend/src,backend/src
sonar.sourceEncoding=UTF-8

# Cobertura LCOV generada por Jest en frontend.
# Esta línea no produce efecto hasta que configures Jest y escribas tests.
# Cuando los tengas: https://nextjs.org/docs/app/building-your-application/testing/jest
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Reporte de ESLint generado por el step "ESLint JSON report" del workflow
sonar.eslint.reportPaths=eslint-report.json

# Excluir archivos que no deben contar en el análisis de Sonar
sonar.exclusions=\
  **/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,\
  frontend/.next/**,\
  frontend/coverage/**,\
  **/node_modules/**
