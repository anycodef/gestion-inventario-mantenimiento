services:
  db:
    image: postgres:15-alpine
    container_name: inventory-db
    environment:
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRES_DB: ${POSTGRESQL_DB}
    ports:
      - "${POSTGRESQL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER:-postgres} -d ${POSTGRESQL_DB:-gestion_inventario}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: inventory-backend
    environment:
      POSTGRESQL_HOST: db
      POSTGRESQL_USER: ${POSTGRESQL_USER}
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRESQL_DB: ${POSTGRESQL_DB}
      POSTGRESQL_PORT: ${POSTGRESQL_PORT:-5432}
      PORT: ${PORT:-3001}
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: pnpm run dev
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: inventory-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: pnpm run dev
    depends_on:
      backend:
        condition: service_started

  sonar-db:
    image: postgres:15-alpine
    container_name: inventory-sonar-db
    environment:
      POSTGRES_USER: ${SONARQUBE_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonarpassword}
      POSTGRES_DB: ${SONARQUBE_DB_NAME:-sonarqube}
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONARQUBE_DB_USER:-sonar} -d ${SONARQUBE_DB_NAME:-sonarqube}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  sonarqube:
    image: sonarqube:community
    container_name: inventory-sonarqube
    ports:
      - "${SONARQUBE_PORT:-9000}:9000"
    environment:
      - SONAR_JDBC_USERNAME=${SONARQUBE_DB_USER:-sonar}
      - SONAR_JDBC_PASSWORD=${SONARQUBE_DB_PASSWORD:-sonarpassword}
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/${SONARQUBE_DB_NAME:-sonarqube}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      sonar-db:
        condition: service_healthy

volumes:
  postgres_data:
  sonar_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

