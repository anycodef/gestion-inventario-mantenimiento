# SonarQube Project Configuration for Frontend
sonar.projectKey=gestion-inventario-frontend
sonar.projectName=Gestión de Inventario - Frontend
sonar.projectVersion=1.0.0

# Host URL (usually maps to local sonarqube container)
sonar.host.url=http://localhost:9000

# Path to sources
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/.next/**,**/node_modules/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage report path (if Jest is configured)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
