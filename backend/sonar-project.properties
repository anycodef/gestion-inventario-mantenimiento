# SonarQube Project Configuration for Backend
sonar.projectKey=gestion-inventario-backend
sonar.projectName=Gestión de Inventario - Backend
sonar.projectVersion=1.0.0

# Host URL (usually maps to local sonarqube container)
sonar.host.url=http://localhost:9000

# Path to sources
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.spec.ts

# Coverage report path (if Jest is configured)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
